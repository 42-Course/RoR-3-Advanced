name: Build & Push images to GHCR

# CI responsibility: build every exercise's production image and push it to
# GHCR. Deployment is a SEPARATE, manual step (`kamal deploy --skip-push`)
# that pulls these prebuilt images.

on:
  push:
    branches: [main]
    paths:
      - "ex*/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Discover every exNN/acme app that has a Dockerfile and emit a build matrix.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        shell: bash
        run: |
          items=()
          for d in ex*/acme; do
            [ -f "$d/Dockerfile" ] || continue
            ex="${d%%/acme}"                       # e.g. ex00
            items+=("{\"ex\":\"$ex\",\"context\":\"$d\"}")
          done
          if [ ${#items[@]} -eq 0 ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            json=$(IFS=,; echo "${items[*]}")
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[$json]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/acme-${{ matrix.ex }}
          # Raw full SHA is what Kamal expects as the image tag (git rev-parse HEAD).
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.ex }}
          cache-to: type=gha,mode=max,scope=${{ matrix.ex }}
